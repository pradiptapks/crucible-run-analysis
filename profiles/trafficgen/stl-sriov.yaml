name: "TrafficGen STL + SR-IOV"
benchmark: "trafficgen"
version: 2
extends: "_base"

match:
  tags:
    trafficgen_backend: ["trex-txrx", "trex-txrx-profile"]
  tools_present: ["dpdk"]
  tools_absent: ["ovs"]

primary_metrics:
  - source: "trafficgen"
    type: "rx-pps"
    label: "RX Packets/sec"
    class: "throughput"
    thresholds: {}

  - source: "trafficgen"
    type: "tx-pps"
    label: "TX Packets/sec"
    class: "throughput"
    thresholds: {}

  - source: "trafficgen"
    type: "l2-rx-bps"
    label: "L2 RX Throughput (bps)"
    class: "throughput"
    thresholds: {}

  - source: "trafficgen"
    type: "l2-tx-bps"
    label: "L2 TX Throughput (bps)"
    class: "throughput"
    thresholds: {}

  - source: "trafficgen"
    type: "l1-rx-bps"
    label: "L1 RX Throughput (bps)"
    class: "throughput"
    thresholds: {}

  - source: "trafficgen"
    type: "l1-tx-bps"
    label: "L1 TX Throughput (bps)"
    class: "throughput"
    thresholds: {}

  - source: "trafficgen"
    type: "lost-rx-pps"
    label: "Lost RX Packets/sec"
    class: "throughput"
    thresholds:
      warn_above: 0
      critical_above: 1000

  - source: "trafficgen"
    type: "max-roundtrip-usec"
    label: "Max Round-Trip (usec)"
    class: "count"
    thresholds:
      warn_above: 500
      critical_above: 2000

  - source: "trafficgen"
    type: "mean-roundtrip-usec"
    label: "Mean Round-Trip (usec)"
    class: "count"
    thresholds:
      warn_above: 200
      critical_above: 1000

tool_correlations:
  # ---- DPDK NIC telemetry (primary visibility for SR-IOV) ----
  - tool: "dpdk"
    source: "dpdk*"
    condition: "tool_present"
    metrics:
      - type: "rx-missed-sec"
        label: "DPDK RX Missed/sec"
        aggregation: "sum"
        filter:
          names: ["device"]
        thresholds:
          warn_above: 100
          critical_above: 1000

      - type: "rx-pps"
        label: "DPDK RX PPS"
        aggregation: "per_instance"
        filter:
          names: ["device"]
        thresholds: {}

      - type: "tx-pps"
        label: "DPDK TX PPS"
        aggregation: "per_instance"
        filter:
          names: ["device"]
        thresholds: {}

      - type: "rx-Gbps"
        label: "DPDK RX Gbps"
        aggregation: "per_instance"
        filter:
          names: ["device"]
        thresholds: {}

      - type: "tx-Gbps"
        label: "DPDK TX Gbps"
        aggregation: "per_instance"
        filter:
          names: ["device"]
        thresholds: {}

      - type: "mempool-used-pct"
        label: "DPDK Mempool Used %"
        aggregation: "max"
        filter:
          names: ["mempool_name"]
        thresholds:
          warn_above: 80
          critical_above: 95

      - type: "queue-pps"
        label: "DPDK Queue PPS"
        aggregation: "per_instance"
        filter:
          names: ["device", "direction", "queue"]
        thresholds: {}

      - type: "link-status"
        label: "Link Status"
        aggregation: "per_instance"
        filter:
          names: ["device"]
        thresholds: {}

  # ---- ethtool NIC counters (critical for SR-IOV visibility) ----
  - tool: "ethtool"
    source: "ethtool"
    condition: "tool_present"
    metrics:
      - type: "packets-sec"
        label: "NIC Packets/sec"
        aggregation: "per_instance"
        filter:
          names: ["interface", "direction"]
        thresholds: {}

      - type: "bytes-sec"
        label: "NIC Bytes/sec"
        aggregation: "per_instance"
        filter:
          names: ["interface", "direction"]
        thresholds: {}

      - type: "errors-sec"
        label: "NIC Errors/sec"
        aggregation: "sum"
        filter:
          names: ["interface", "direction"]
        thresholds:
          warn_above: 100

      - type: "dropped-sec"
        label: "NIC Dropped/sec"
        aggregation: "sum"
        filter:
          names: ["interface", "direction"]
        thresholds:
          warn_above: 0
          critical_above: 100

  # ---- ebpf-dpdk PMD profiling ----
  - tool: "ebpf-dpdk"
    source: "ebpf-dpdk*"
    condition: "tool_present"
    metrics:
      - type: "top-function-pct"
        label: "PMD Top Function %"
        aggregation: "max"
        filter:
          names: ["function"]
        thresholds: {}

      - type: "top1-function-pct"
        label: "PMD Top1 Function %"
        aggregation: "max"
        filter:
          names: ["function"]
        thresholds: {}

      - type: "top2-function-pct"
        label: "PMD Top2 Function %"
        aggregation: "max"
        filter:
          names: ["function"]
        thresholds: {}

      - type: "top3-function-pct"
        label: "PMD Top3 Function %"
        aggregation: "max"
        filter:
          names: ["function"]
        thresholds: {}

      - type: "perf-samples"
        label: "Perf Samples"
        aggregation: "sum"
        filter:
          names: []
        thresholds: {}

      - type: "perf-samples-active"
        label: "Perf Samples (Active Traffic)"
        aggregation: "sum"
        filter:
          names: []
        thresholds: {}

profiler_correlations:
  - source: "trafficgen-trex-profiler"
    condition: "source_present"
    metrics:
      - type: "per-core-Gbps"
        label: "TRex Per-Core Gbps"
        aggregation: "mean"
        filter:
          names: []
        thresholds: {}

      - type: "tx-cpu-util"
        label: "TRex TX CPU Util %"
        aggregation: "mean"
        filter:
          names: []
        thresholds:
          warn_above: 80
          critical_above: 95

      - type: "rx-cpu-util"
        label: "TRex RX CPU Util %"
        aggregation: "mean"
        filter:
          names: []
        thresholds:
          warn_above: 80

      - type: "queue-full-per-second"
        label: "TRex Queue Full/sec"
        aggregation: "mean"
        filter:
          names: []
        thresholds:
          warn_above: 0

      - type: "rx-drop-bps"
        label: "TRex RX Drop (bps)"
        aggregation: "mean"
        filter:
          names: []
        thresholds:
          warn_above: 0

      - type: "mean-round-trip-usec"
        label: "Per-Stream Latency Avg (usec)"
        aggregation: "per_instance"
        filter:
          names: ["stream"]
        thresholds:
          warn_above: 500
          critical_above: 2000

      - type: "max-round-trip-usec"
        label: "Per-Stream Latency Max (usec)"
        aggregation: "per_instance"
        filter:
          names: ["stream"]
        thresholds:
          warn_above: 2000

      - type: "dropped-latency-pps"
        label: "Per-Stream Dropped PPS"
        aggregation: "per_instance"
        filter:
          names: ["stream"]
        thresholds:
          warn_above: 0

      - type: "port-rx-pps"
        label: "TRex Port RX PPS"
        aggregation: "per_instance"
        filter:
          names: ["rx_port"]
        thresholds: {}

      - type: "port-tx-pps"
        label: "TRex Port TX PPS"
        aggregation: "per_instance"
        filter:
          names: ["tx_port"]
        thresholds: {}

patterns:
  - name: "NIC Ring Buffer Drop"
    severity: "critical"
    description: >
      DPDK is reporting missed RX packets coinciding with STL packet loss,
      indicating the NIC ring buffer is overflowing in SR-IOV mode.
    conditions:
      - source: "dpdk*"
        type: "rx-missed-sec"
        check: "mean_above"
        value: 0
      - source: "trafficgen"
        type: "lost-rx-pps"
        check: "value_above"
        value: 0
    recommendation: >
      Increase VF ring buffer size (ethtool -G), enable interrupt
      coalescing, or distribute traffic across more queues.

  - name: "TRex Generator Bottleneck"
    severity: "warning"
    description: >
      TRex TX CPU is saturated and queues are backing up, indicating
      the traffic generator itself cannot sustain the offered rate.
    conditions:
      - source: "trafficgen-trex-profiler"
        type: "tx-cpu-util"
        check: "mean_above"
        value: 80
      - source: "trafficgen-trex-profiler"
        type: "queue-full-per-second"
        check: "mean_above"
        value: 0
    recommendation: >
      Reduce offered rate, optimize traffic profile complexity, or
      add more TRex worker cores.

  - name: "Latency Spike under Load"
    severity: "warning"
    description: >
      High latency is observed while DPDK is dropping packets, suggesting
      the DUT is congested and introducing queuing delay.
    conditions:
      - source: "trafficgen"
        type: "max-roundtrip-usec"
        check: "value_above"
        value: 2000
      - source: "dpdk*"
        type: "rx-missed-sec"
        check: "mean_above"
        value: 0
    recommendation: >
      Reduce offered load to find the latency-bounded throughput, or
      investigate DUT buffer/queue sizing.

  - name: "Memory Pressure During Test"
    severity: "warning"
    description: >
      System is actively paging out memory during the test, which can
      cause latency spikes and throughput drops.
    conditions:
      - source: "sar-mem"
        type: "Memory-Used-Percent"
        check: "mean_above"
        value: 90
      - source: "sar-mem"
        type: "KB-Paged-out-sec"
        check: "mean_above"
        value: 1000
    recommendation: >
      Reduce memory consumers, increase system RAM, or check for memory
      leaks in the application.

  - name: "NIC Error Storm"
    severity: "warning"
    description: >
      Physical NIC is reporting elevated error rates via ethtool counters,
      which may indicate cable or signal integrity issues.
    conditions:
      - source: "ethtool"
        type: "errors-sec"
        check: "sum_above"
        value: 100
    recommendation: >
      Check physical cabling, NIC firmware version, and interface error
      counters for specific error types.

  - name: "DPDK Mempool Exhaustion"
    severity: "critical"
    description: >
      DPDK memory pool utilization is critically high, indicating buffer
      exhaustion which causes packet drops.
    conditions:
      - source: "dpdk*"
        type: "mempool-used-pct"
        check: "any_above"
        value: 90
    recommendation: >
      Increase mempool size, reduce packet buffer retention time, or
      check for memory leaks in the DPDK application.

  - name: "VF Queue Imbalance"
    severity: "info"
    description: >
      Significant variance in per-queue packet rates suggests uneven
      RSS distribution across VF queues.
    conditions:
      - source: "ethtool"
        type: "dropped-sec"
        check: "sum_above"
        value: 0
    recommendation: >
      Review RSS hash configuration, consider adjusting indirection
      table, or check for flow affinity issues.
